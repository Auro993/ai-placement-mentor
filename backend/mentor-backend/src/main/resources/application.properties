# ============================================================
# DATABASE CONFIGURATION - USING ENVIRONMENT VARIABLES
# ============================================================

# Database Connection - Uses environment variables
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ai_placement_mentor?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Aurosmita}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.MySQL8Dialect}
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# SERVER CONFIGURATION
# ============================================================
server.port=8080

# ============================================================
# FILE UPLOAD CONFIGURATION
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# LOGGING
# ============================================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

# ============================================================
# AI SERVICE URL
# ============================================================
ai.service.url=${AI_SERVICE_URL:http://localhost:5001}